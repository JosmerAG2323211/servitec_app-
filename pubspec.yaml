name: servitec_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  image_picker: ^1.0.7
  http: ^1.1.0
  sqflite: ^2.3.0
  path: ^1.9.0
  mysql1: ^0.20.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/imagen-vectorial.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true
  # Debes registrar la carpeta de assets aquí para que Flutter la reconozca
  assets:
    - assets/images/

# Esta sección debe ir pegada al margen izquierdo (sin espacios antes)
